name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish alpha packages
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dildin Build Control ${{ github.ref_name }}"
          releaseBody: |
            First public alpha of Dildin Build Control.

            This build is unsigned and not notarized. macOS may display a Gatekeeper warning. Review the project README, run mock mode first, and do not place credentials in project files.
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          args: --target ${{ matrix.target }} --bundles app,dmg
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"

      - name: Publish SHA-256 checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          dmg_path="$(find "$bundle_dir" -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          checksum_file="Dildin_Build_Control_0.1.0_${{ matrix.arch }}.sha256"
          shasum -a 256 "$dmg_path" | sed "s|$dmg_path|$(basename "$dmg_path")|" > "$checksum_file"
          gh release upload "${GITHUB_REF_NAME}" "$checksum_file" --clobber
