name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release metadata
        run: pnpm release-check -- "${GITHUB_REF_NAME}"

      - name: Build frontend
        run: pnpm build

      - name: Run Guided Run smoke check
        run: pnpm guided-run-smoke

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-14
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            asset_arch: aarch64
            target: aarch64-apple-darwin
          - arch: x64
            asset_arch: x64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish alpha packages
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dildin Build Control ${{ github.ref_name }}"
          releaseBody: |
            Automated prerelease build of Dildin Build Control. Review the changelog and installation guide before running it.

            This build is unsigned and not notarized. macOS may display a Gatekeeper warning. Review the project README, run mock mode first, and do not place credentials in project files.
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          args: --target ${{ matrix.target }} --bundles app,dmg
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"

      - name: Publish SHA-256 checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          dmg_path="$(find "$bundle_dir" -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          app_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          checksum_file="Dildin_Build_Control_${app_version}_${{ matrix.arch }}.sha256"
          published_dmg="Dildin.Build.Control_${app_version}_darwin_${{ matrix.asset_arch }}.dmg"
          digest="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"
          printf '%s  %s\n' "$digest" "$published_dmg" > "$checksum_file"
          gh release upload "${GITHUB_REF_NAME}" "$checksum_file" --clobber
